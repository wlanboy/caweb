<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>{% block title %}Zertifikatsverwaltung{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
</head>
<body>
  <header>
    <div class="brand">
      <img src="/static/favicon.svg" alt="" width="28" height="28">
      <h1>Zertifikatsverwaltung</h1>
    </div>
    <nav>
      <a href="/" class="{% if request.url.path == '/' %}active{% endif %}">Neues Zertifikat</a>
      <a href="/certs" class="{% if request.url.path == '/certs' %}active{% endif %}">Zertifikatsliste</a>
      <a href="/ca-info" class="{% if request.url.path == '/ca-info' %}active{% endif %}">CA-Installation</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
